<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .gradient-bg {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow {
            filter: drop-shadow(0 0 12px rgba(59, 130, 246, 0.5));
        }

        /* Add smooth transition for hover effect */
        .floating svg {
            transition: all 0.3s ease;
        }
        .floating:hover svg {
            opacity: 0.4;
            transform: scale(1.1);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center p-4">
    <!-- AI Icons Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
        <!-- Python Logo -->
        <div class="absolute top-10 left-10 floating" style="animation-delay: 0s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 32 32" class="opacity-20 glow">
                <path fill="#3B82F6" d="M15.885 2.1c-7.1 0-6.651 3.07-6.651 3.07v3.19h6.752v1H6.545S2 8.8 2 16.005s4.013 6.912 4.013 6.912h2.396v-3.326s-.13-4.013 3.946-4.013h6.809s3.862.065 3.862-3.732V5.8s.232-3.7-7.141-3.7zm-3.732 2.137a1.214 1.214 0 1 1-1.183 1.244v-.02a1.214 1.214 0 0 1 1.214-1.214z"/>
                <path fill="#3B82F6" d="M16.085 29.91c7.1 0 6.651-3.08 6.651-3.08v-3.19h-6.751v-1h9.441S30 23.2 30 16s-4.013-6.912-4.013-6.912h-2.396v3.326s.13 4.013-3.946 4.013h-6.809s-3.862-.065-3.862 3.732V26.2s-.232 3.7 7.141 3.7zm3.732-2.137a1.214 1.214 0 1 1 1.214-1.214 1.214 1.214 0 0 1-1.214 1.214z"/>
            </svg>
        </div>

        <!-- TensorFlow Logo -->
        <div class="absolute top-20 right-20 floating" style="animation-delay: 1s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 32 32" class="opacity-20 glow">
                <path fill="#3B82F6" d="M26.135 16.762h.111v4.024h-.111zm-1.459 0h.111v4.024h-.111zm-1.457 0h.111v4.024h-.111zm-1.458 0h.111v4.024h-.111zm-1.458 0h.111v4.024h-.111zm-5.831 0h.111v4.024h-.111zm-1.458 0h.111v4.024h-.111zm-1.458 0h.111v4.024h-.111zm-1.458 0h.111v4.024H9.556zm-1.458 0h.111v4.024h-.111z"/>
                <path fill="#3B82F6" d="M27.594 15.716V11.27L16.007 4.596 4.419 11.27v13.348l11.588 6.674 11.587-6.674v-4.446l-11.587 6.674-7.726-4.449v-8.9l7.726-4.449 7.726 4.449v4.446h3.861z"/>
            </svg>
        </div>

        <!-- PyTorch Logo -->
        <div class="absolute bottom-20 left-20 floating" style="animation-delay: 2s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="96" height="96" viewBox="0 0 32 32" class="opacity-20 glow">
                <path fill="#3B82F6" d="M12.735 17.474a1.426 1.426 0 1 1-2.852 0 1.426 1.426 0 0 1 2.852 0z"/>
                <path fill="#3B82F6" d="M28.456 15.474a12.456 12.456 0 0 0-24.912 0c0 6.881 5.575 12.456 12.456 12.456 6.881 0 12.456-5.575 12.456-12.456zM4.544 15.474a10.456 10.456 0 0 1 20.912 0c0 5.769-4.687 10.456-10.456 10.456S4.544 21.243 4.544 15.474z"/>
                <path fill="#3B82F6" d="M18.265 11.474a1.426 1.426 0 1 0 2.852 0 1.426 1.426 0 0 0-2.852 0z"/>
            </svg>
        </div>

        <!-- Jupyter Logo -->
        <div class="absolute bottom-10 right-10 floating" style="animation-delay: 1.5s;">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 32 32" class="opacity-20 glow">
                <path fill="#3B82F6" d="M16.2 2C8.9 2 3 7.9 3 15.2c0 7.3 5.9 13.2 13.2 13.2 7.3 0 13.2-5.9 13.2-13.2C29.4 7.9 23.5 2 16.2 2zm0 24.5c-6.2 0-11.3-5.1-11.3-11.3S10 3.9 16.2 3.9s11.3 5.1 11.3 11.3-5.1 11.3-11.3 11.3z"/>
                <path fill="#3B82F6" d="M16.2 19.5c-2.4 0-4.3-1.9-4.3-4.3s1.9-4.3 4.3-4.3 4.3 1.9 4.3 4.3-1.9 4.3-4.3 4.3zm0-6.7c-1.3 0-2.4 1.1-2.4 2.4s1.1 2.4 2.4 2.4 2.4-1.1 2.4-2.4-1.1-2.4-2.4-2.4z"/>
            </svg>
        </div>
    </div>

    <!-- Registration Card -->
    <div class="glass-effect rounded-2xl p-8 w-full max-w-md relative z-10">
        <!-- Logo -->
        <div class="text-center mb-8">
            <!-- Modern AI Brain Logo -->
            <svg class="w-20 h-20 mx-auto mb-4 text-blue-500" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z" fill="currentColor"/>
                <path d="M12 6c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6-2.69-6-6-6zm0 10c-2.21 0-4-1.79-4-4s1.79-4 4-4 4 1.79 4 4-1.79 4-4 4z" fill="currentColor"/>
                <path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm0 6c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z" fill="currentColor"/>
            </svg>
            <h1 class="text-3xl font-bold text-blue-400">Create Account</h1>
            <p class="text-gray-400 mt-2">Join our AI-powered platform</p>
        </div>

        <!-- Registration Form -->
        <form method="POST" action="{{ url_for('register') }}" class="space-y-6">
            <!-- Username Field -->
            <div>
                <label class="block text-gray-300 mb-2 text-sm font-medium">Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-400">
                        <i class="fas fa-user"></i>
                    </span>
                    <input type="text" name="username" required
                           class="w-full pl-10 pr-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg 
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2 
                                  focus:ring-blue-500 focus:border-transparent"
                           placeholder="Enter your username">
                </div>
            </div>

            <!-- Email Field -->
            <div>
                <label class="block text-gray-300 mb-2 text-sm font-medium">Email</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required
                           class="w-full pl-10 pr-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg 
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2 
                                  focus:ring-blue-500 focus:border-transparent"
                           placeholder="Enter your email">
                </div>
            </div>

            <!-- Password Field -->
            <div>
                <label class="block text-gray-300 mb-2 text-sm font-medium">Password</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-blue-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" required
                           class="w-full pl-10 pr-4 py-3 bg-gray-800/50 border border-gray-700 rounded-lg 
                                  text-white placeholder-gray-500 focus:outline-none focus:ring-2 
                                  focus:ring-blue-500 focus:border-transparent"
                           placeholder="Create a password">
                </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" 
                    class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-700 text-white font-medium 
                           rounded-lg transition duration-200 ease-in-out transform hover:scale-105
                           hover:shadow-lg hover:shadow-blue-500/50">
                Create Account
            </button>
        </form>

        <!-- Login Link -->
        <p class="mt-8 text-center text-gray-400">
            Already have an account? 
            <a href="{{ url_for('login') }}" class="text-blue-400 hover:text-blue-300 font-medium">Sign in</a>
        </p>
    </div>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="fixed top-4 right-4 z-50 {{ 'bg-green-500' if category == 'success' else 'bg-red-500' }} text-white px-6 py-3 rounded-lg shadow-lg">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
